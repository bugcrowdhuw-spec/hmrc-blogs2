# OpenCLAW Agent Configuration

agent:
  name: TaxPrep Assistant
  version: 2.0.0
  type: property-tax-specialist

runtime:
  framework: openclaw
  model: claude-sonnet-4-20250514
  max_tokens: 4000
  temperature: 0.7

memory:
  daily_notes: memory/YYYY-MM-DD.md
  user_profile: USER.md
  long_term: MEMORY.md

skills:
  - tax-reporting
  - mtd-compliance
  - expense-categorization
  - property-portfolio
  - deadline-reminders
  - invoice-generation
  - platform-integration

commercial:
  tiered_pricing: true
  api_access: true
  user_management: true

data:
  storage: sqlite
  path: data/taxprep.db

api:
  hmrc_mtd: true
  platforms:
    - airbnb
    - booking
    - vrbo

communication:
  channels:
    - chat
    - email_digest
  timezone: Europe/London

heartbeat:
  enabled: true
  interval_minutes: 60
  checks:
    - tax_deadlines
    - mtd_compliance
    - pending_reports
    - property_updates

# Environment Variables
# Required:
#   OPENCLAW_API_KEY=your_api_key
#   CLAUDE_API_KEY=your_claude_key
# Optional:
#   AGENT_NAME=TaxPrep
#   USER_DATA_PATH=./data/users
#   LOG_LEVEL=info
# Platform API Keys:
#   AIRBNB_API_TOKEN=your_airbnb_token
#   BOOKING_API_KEY=your_booking_key
#   VRBO_API_KEY=your_vrbo_key
# HMRC API:
#   HMRC_CLIENT_ID=your_hmrc_client_id
#   HMRC_CLIENT_SECRET=your_hmrc_client_secret