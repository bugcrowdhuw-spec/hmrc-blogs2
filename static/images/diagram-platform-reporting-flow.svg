<!-- Diagram 1: How Platform Reporting Works -->
<!-- Save as SVG, use in Blog Post 2 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="IBM Plex Sans, sans-serif">
  <defs>
    <linearGradient id="box1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="box2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="box3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#b91c1c"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">How HMRC Digital Platform Reporting Works</text>

  <!-- Box 1: Your Bookings -->
  <rect x="40" y="100" width="200" height="120" rx="12" fill="url(#box1)"/>
  <text x="140" y="145" text-anchor="middle" font-size="16" font-weight="600" fill="#fff">Your Bookings</text>
  <text x="140" y="170" text-anchor="middle" font-size="13" fill="#94a3b8">Airbnb, Booking.com</text>
  <text x="140" y="190" text-anchor="middle" font-size="13" fill="#94a3b8">VRBO, and 20+ more</text>

  <!-- Arrow 1 -->
  <line x1="250" y1="160" x2="310" y2="160" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker></defs>

  <!-- Box 2: Platform Reports -->
  <rect x="320" y="100" width="200" height="120" rx="12" fill="url(#box2)"/>
  <text x="420" y="140" text-anchor="middle" font-size="16" font-weight="600" fill="#fff">Platform Reports</text>
  <text x="420" y="165" text-anchor="middle" font-size="13" fill="#bfdbfe">Income, transactions</text>
  <text x="420" y="185" text-anchor="middle" font-size="13" fill="#bfdbfe">as OECD DPI XML</text>

  <!-- Arrow 2 -->
  <line x1="530" y1="160" x2="590" y2="160" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow2)"/>
  <defs><marker id="arrow2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/></marker></defs>

  <!-- Box 3: HMRC -->
  <rect x="600" y="100" width="160" height="120" rx="12" fill="url(#box3)"/>
  <text x="680" y="145" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">HMRC</text>
  <text x="680" y="170" text-anchor="middle" font-size="13" fill="#fecaca">Receives XML data</text>
  <text x="680" y="190" text-anchor="middle" font-size="13" fill="#fecaca">Cross-checks your</text>
  <text x="680" y="205" text-anchor="middle" font-size="13" fill="#fecaca">Self Assessment</text>

  <!-- Bottom note -->
  <text x="400" y="270" text-anchor="middle" font-size="14" fill="#64748b">Since January 2024, platforms must report your earnings to HMRC automatically.</text>
  <text x="400" y="295" text-anchor="middle" font-size="14" fill="#64748b">Your Self Assessment must match what HMRC already knows.</text>
</svg>
