<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5a623;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>
  <text x="400" y="50" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="24" font-weight="bold">HMRC Reporting Workflow</text>
  <!-- Boxes -->
  <rect x="40" y="90" width="160" height="70" rx="8" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
  <text x="120" y="120" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="13" font-weight="bold">Platform Data</text>
  <text x="120" y="140" text-anchor="middle" fill="#aaaaaa" font-family="system-ui" font-size="11">Airbnb, Booking.com</text>

  <rect x="240" y="90" width="160" height="70" rx="8" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
  <text x="320" y="120" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="13" font-weight="bold">Import &amp; Calculate</text>
  <text x="320" y="140" text-anchor="middle" fill="#aaaaaa" font-family="system-ui" font-size="11">Gross income + fees</text>

  <rect x="440" y="90" width="160" height="70" rx="8" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
  <text x="520" y="120" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="13" font-weight="bold">Track Expenses</text>
  <text x="520" y="140" text-anchor="middle" fill="#aaaaaa" font-family="system-ui" font-size="11">Per property</text>

  <rect x="640" y="90" width="120" height="70" rx="8" fill="url(#accent)"/>
  <text x="700" y="120" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="13" font-weight="bold">HMRC</text>
  <text x="700" y="140" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="11">Report</text>

  <!-- Arrows -->
  <line x1="200" y1="125" x2="240" y2="125" stroke="#e94560" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="125" x2="440" y2="125" stroke="#e94560" stroke-width="2"/>
  <line x1="600" y1="125" x2="640" y2="125" stroke="#e94560" stroke-width="2"/>

  <!-- Bottom info -->
  <rect x="40" y="200" width="720" height="160" rx="8" fill="#0f3460" opacity="0.5"/>
  <text x="400" y="235" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="16" font-weight="bold">Why This Matters</text>
  <text x="80" y="270" fill="#cccccc" font-family="system-ui" font-size="13">✓ Platforms report gross income to HMRC since January 2024</text>
  <text x="80" y="295" fill="#cccccc" font-family="system-ui" font-size="13">✓ Making Tax Digital requires quarterly digital submissions</text>
  <text x="80" y="320" fill="#cccccc" font-family="system-ui" font-size="13">✓ Incorrect reporting triggers penalties from £100 to 100% of tax due</text>
  <text x="80" y="345" fill="#cccccc" font-family="system-ui" font-size="13">✓ Automated reporting saves 20-42 hours per year</text>
</svg>
