<!-- Diagram 2: MTD Timeline -->
<!-- Save as SVG, use in Blog Post 3 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" font-family="IBM Plex Sans, sans-serif">
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Making Tax Digital: Timeline for Landlords</text>

  <!-- Timeline line -->
  <line x1="60" y1="140" x2="740" y2="140" stroke="#cbd5e1" stroke-width="3" stroke-dasharray="8,4"/>

  <!-- Milestone 1: Jan 2024 -->
  <circle cx="120" cy="140" r="14" fill="#2563eb"/>
  <text x="120" y="145" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">✓</text>
  <text x="120" y="115" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a5f">Jan 2024</text>
  <text x="120" y="175" text-anchor="middle" font-size="12" fill="#475569">Platform</text>
  <text x="120" y="192" text-anchor="middle" font-size="12" fill="#475569">Reporting</text>
  <text x="120" y="209" text-anchor="middle" font-size="12" fill="#475569">Starts</text>

  <!-- Milestone 2: Apr 2025 -->
  <circle cx="260" cy="140" r="14" fill="#2563eb"/>
  <text x="260" y="145" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">✓</text>
  <text x="260" y="115" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a5f">Apr 2025</text>
  <text x="260" y="175" text-anchor="middle" font-size="12" fill="#475569">FHL Regime</text>
  <text x="260" y="192" text-anchor="middle" font-size="12" fill="#475569">Abolished</text>

  <!-- Milestone 3: Apr 2026 -->
  <circle cx="420" cy="140" r="18" fill="#dc2626"/>
  <text x="420" y="145" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">!</text>
  <text x="420" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">Apr 2026</text>
  <text x="420" y="175" text-anchor="middle" font-size="12" fill="#475569">MTD Starts:</text>
  <text x="420" y="192" text-anchor="middle" font-size="12" font-weight="600" fill="#dc2626">Income &gt; £50k</text>
  <rect x="355" y="88" width="130" height="14" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="420" y="99" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">⚠ NEXT DEADLINE</text>

  <!-- Milestone 4: Apr 2027 -->
  <circle cx="570" cy="140" r="14" fill="#f59e0b"/>
  <text x="570" y="145" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">2</text>
  <text x="570" y="115" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a5f">Apr 2027</text>
  <text x="570" y="175" text-anchor="middle" font-size="12" fill="#475569">MTD Starts:</text>
  <text x="570" y="192" text-anchor="middle" font-size="12" font-weight="600" fill="#f59e0b">Income &gt; £30k</text>

  <!-- Milestone 5: Apr 2028 -->
  <circle cx="700" cy="140" r="14" fill="#94a3b8"/>
  <text x="700" y="145" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">3</text>
  <text x="700" y="115" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a5f">Apr 2028</text>
  <text x="700" y="175" text-anchor="middle" font-size="12" fill="#475569">MTD Starts:</text>
  <text x="700" y="192" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">Income &gt; £20k</text>
  <text x="700" y="209" text-anchor="middle" font-size="11" fill="#94a3b8">(proposed)</text>

  <!-- Bottom note -->
  <text x="400" y="255" text-anchor="middle" font-size="13" fill="#64748b">Start preparing now — digital records, compatible software, quarterly submissions.</text>
</svg>
