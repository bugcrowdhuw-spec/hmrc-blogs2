<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>
  <text x="400" y="40" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="24" font-weight="bold">Manual vs Automated Reporting</text>

  <!-- Manual Column -->
  <rect x="60" y="70" width="310" height="300" rx="8" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
  <text x="215" y="100" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="18" font-weight="bold">❌ Manual (Spreadsheet)</text>
  <text x="80" y="135" fill="#cccccc" font-family="system-ui" font-size="13">• Download CSVs manually</text>
  <text x="80" y="160" fill="#cccccc" font-family="system-ui" font-size="13">• Copy-paste data into spreadsheet</text>
  <text x="80" y="185" fill="#cccccc" font-family="system-ui" font-size="13">• Calculate gross income by hand</text>
  <text x="80" y="210" fill="#cccccc" font-family="system-ui" font-size="13">• Match properties manually</text>
  <text x="80" y="235" fill="#cccccc" font-family="system-ui" font-size="13">• Track expenses in separate sheet</text>
  <text x="80" y="260" fill="#cccccc" font-family="system-ui" font-size="13">• Enter into Self Assessment</text>
  <text x="80" y="285" fill="#cccccc" font-family="system-ui" font-size="13">• No HMRC XML output</text>
  <rect x="80" y="310" width="270" height="40" rx="6" fill="#e94560" opacity="0.2"/>
  <text x="215" y="336" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="16" font-weight="bold">2-4 hours/month</text>

  <!-- Automated Column -->
  <rect x="430" y="70" width="310" height="300" rx="8" fill="#0f3460" stroke="#4ecca3" stroke-width="2"/>
  <text x="585" y="100" text-anchor="middle" fill="#4ecca3" font-family="system-ui" font-size="18" font-weight="bold">✅ Automated (Software)</text>
  <text x="450" y="135" fill="#cccccc" font-family="system-ui" font-size="13">• Upload CSVs (auto-import)</text>
  <text x="450" y="160" fill="#cccccc" font-family="system-ui" font-size="13">• Data extracted automatically</text>
  <text x="450" y="185" fill="#cccccc" font-family="system-ui" font-size="13">• Gross income calculated</text>
  <text x="450" y="210" fill="#cccccc" font-family="system-ui" font-size="13">• Properties matched across platforms</text>
  <text x="450" y="235" fill="#cccccc" font-family="system-ui" font-size="13">• Expenses tracked per property</text>
  <text x="450" y="260" fill="#cccccc" font-family="system-ui" font-size="13">• One-click HMRC report</text>
  <text x="450" y="285" fill="#cccccc" font-family="system-ui" font-size="13">• XML + SA105 output</text>
  <rect x="450" y="310" width="270" height="40" rx="6" fill="#4ecca3" opacity="0.2"/>
  <text x="585" y="336" text-anchor="middle" fill="#4ecca3" font-family="system-ui" font-size="16" font-weight="bold">15-30 minutes/month</text>
</svg>
