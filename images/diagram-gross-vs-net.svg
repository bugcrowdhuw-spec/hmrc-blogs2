<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>
  <text x="400" y="45" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="24" font-weight="bold">Gross vs Net Income</text>
  <text x="400" y="70" text-anchor="middle" fill="#aaaaaa" font-family="system-ui" font-size="14">The #1 reporting mistake Airbnb hosts make</text>

  <!-- Guest Payment -->
  <rect x="60" y="100" width="200" height="120" rx="8" fill="#0f3460" stroke="#4ecca3" stroke-width="2"/>
  <text x="160" y="130" text-anchor="middle" fill="#4ecca3" font-family="system-ui" font-size="14" font-weight="bold">Guest Pays</text>
  <text x="160" y="165" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="36" font-weight="bold">£500</text>
  <text x="160" y="195" text-anchor="middle" fill="#aaaaaa" font-family="system-ui" font-size="12">Total booking amount</text>

  <!-- Arrow -->
  <line x1="260" y1="160" x2="310" y2="160" stroke="#e94560" stroke-width="2"/>

  <!-- Airbnb Fee -->
  <rect x="310" y="100" width="180" height="120" rx="8" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
  <text x="400" y="130" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="14" font-weight="bold">Airbnb Fee (3%)</text>
  <text x="400" y="165" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="36" font-weight="bold">-£15</text>
  <text x="400" y="195" text-anchor="middle" fill="#aaaaaa" font-family="system-ui" font-size="12">Deducted automatically</text>

  <!-- Arrow -->
  <line x1="490" y1="160" x2="540" y2="160" stroke="#e94560" stroke-width="2"/>

  <!-- Your Payout -->
  <rect x="540" y="100" width="200" height="120" rx="8" fill="#0f3460" stroke="#f5a623" stroke-width="2"/>
  <text x="640" y="130" text-anchor="middle" fill="#f5a623" font-family="system-ui" font-size="14" font-weight="bold">Your Payout</text>
  <text x="640" y="165" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="36" font-weight="bold">£485</text>
  <text x="640" y="195" text-anchor="middle" fill="#aaaaaa" font-family="system-ui" font-size="12">What hits your bank</text>

  <!-- HMRC Box -->
  <rect x="60" y="260" width="680" height="110" rx="8" fill="#0f3460" stroke="#4ecca3" stroke-width="2"/>
  <text x="400" y="290" text-anchor="middle" fill="#4ecca3" font-family="system-ui" font-size="16" font-weight="bold">What HMRC Wants to See</text>

  <rect x="100" y="310" width="250" height="40" rx="6" fill="#4ecca3" opacity="0.2"/>
  <text x="225" y="336" text-anchor="middle" fill="#4ecca3" font-family="system-ui" font-size="14" font-weight="bold">Income: £500 (GROSS)</text>

  <rect x="450" y="310" width="250" height="40" rx="6" fill="#e94560" opacity="0.2"/>
  <text x="575" y="336" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="14" font-weight="bold">Expense: £15 (Platform Fee)</text>
</svg>
